<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e8d8"/>
      <stop offset="100%" stop-color="#e8d4b8"/>
    </linearGradient>
    <radialGradient id="glow1" cx="15%" cy="20%" r="40%">
      <stop offset="0%" stop-color="rgba(201,147,80,0.22)"/>
      <stop offset="100%" stop-color="rgba(201,147,80,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="80%" r="40%">
      <stop offset="0%" stop-color="rgba(40,72,56,0.16)"/>
      <stop offset="100%" stop-color="rgba(40,72,56,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Brand mark -->
  <rect x="80" y="80" width="48" height="48" rx="12" fill="#b36d2c"/>
  <text x="104" y="115" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#fffaf4" text-anchor="middle">M</text>

  <!-- Eyebrow -->
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#b36d2c" letter-spacing="4">СТУДИЯ МАССАЖА В КИШИНЕВЕ</text>

  <!-- Title -->
  <text x="80" y="290" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#241c17">Mateev Spa Studio</text>

  <!-- Subtitle -->
  <text x="80" y="370" font-family="Arial, sans-serif" font-size="30" fill="#7d6d60">Массаж и телесная терапия.</text>
  <text x="80" y="414" font-family="Arial, sans-serif" font-size="30" fill="#7d6d60">Онлайн-запись 24/7.</text>

  <!-- Divider -->
  <rect x="80" y="468" width="120" height="3" rx="2" fill="#b36d2c"/>

  <!-- URL -->
  <text x="80" y="530" font-family="Arial, sans-serif" font-size="26" fill="#b36d2c" font-weight="700">mateevmassage.com</text>
</svg>
