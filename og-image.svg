<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7f0e6"/>
      <stop offset="100%" style="stop-color:#ede4d6"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2e22"/>
      <stop offset="100%" style="stop-color:#243b2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Warm glow top-left -->
  <ellipse cx="0" cy="0" rx="480" ry="380" fill="rgba(201,147,80,0.14)"/>

  <!-- Green glow bottom-right -->
  <ellipse cx="1200" cy="630" rx="420" ry="320" fill="rgba(40,72,56,0.10)"/>

  <!-- Left dark panel -->
  <rect x="0" y="0" width="420" height="630" fill="url(#accent)"/>

  <!-- Decorative large letter -->
  <text x="390" y="500" font-family="Georgia,serif" font-size="500" font-weight="700"
        fill="rgba(255,255,255,0.04)" text-anchor="end">M</text>

  <!-- Kicker -->
  <text x="56" y="184" font-family="Arial,sans-serif" font-size="15" font-weight="600"
        fill="rgba(179,109,44,0.9)" letter-spacing="4">КИШИНЁВ · МОЛДОВА</text>

  <!-- Brand name on dark panel -->
  <text x="56" y="244" font-family="Georgia,serif" font-size="50" font-weight="600"
        fill="#ffffff" letter-spacing="1">Mateev</text>
  <text x="56" y="300" font-family="Georgia,serif" font-size="50" font-weight="600"
        fill="#ffffff" letter-spacing="1">Spa Studio</text>

  <!-- Divider line -->
  <line x1="56" y1="334" x2="340" y2="334" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- Tagline on dark panel -->
  <text x="56" y="368" font-family="Arial,sans-serif" font-size="17" fill="rgba(255,255,255,0.6)">Массаж и телесная терапия</text>
  <text x="56" y="392" font-family="Arial,sans-serif" font-size="17" fill="rgba(255,255,255,0.6)">для восстановления</text>

  <!-- CTA pill -->
  <rect x="56" y="444" width="200" height="48" rx="24" fill="rgba(179,109,44,0.9)"/>
  <text x="156" y="474" font-family="Arial,sans-serif" font-size="16" font-weight="700"
        fill="#ffffff" text-anchor="middle">Онлайн-запись</text>

  <!-- Right side headline -->
  <text x="492" y="220" font-family="Georgia,serif" font-size="68" font-weight="600"
        fill="#1a2e22" letter-spacing="-1">Забота о теле —</text>
  <text x="492" y="300" font-family="Georgia,serif" font-size="68" font-weight="600"
        fill="#1a2e22" letter-spacing="-1">ваш выбор</text>

  <!-- Features -->
  <text x="492" y="376" font-family="Arial,sans-serif" font-size="19" fill="#7d6d60">· Классический, тайский, спортивный массаж</text>
  <text x="492" y="408" font-family="Arial,sans-serif" font-size="19" fill="#7d6d60">· Реабилитация и восстановление</text>
  <text x="492" y="440" font-family="Arial,sans-serif" font-size="19" fill="#7d6d60">· 10+ лет практики · Призёр ЧМ 2017</text>

  <!-- Domain -->
  <text x="492" y="534" font-family="Arial,sans-serif" font-size="22" font-weight="600"
        fill="#b36d2c" letter-spacing="0.5">mateevmassage.com</text>

  <!-- Bottom accent -->
  <rect x="0" y="618" width="1200" height="12" fill="rgba(179,109,44,0.5)"/>
</svg>
