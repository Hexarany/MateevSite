# /etc/nginx/sites-available/mateevspa.md

server {
    listen 80;
    server_name mateevspa.md www.mateevspa.md;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mateevspa.md www.mateevspa.md;

    ssl_certificate     /etc/letsencrypt/live/mateevspa.md/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mateevspa.md/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Логи
    access_log /var/log/nginx/mateev.access.log;
    error_log  /var/log/nginx/mateev.error.log;

    # Размер тела запроса (форма записи)
    client_max_body_size 1m;

    # Кэш статики
    location ~* \.(css|js)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    }

    # Health check — не логируем
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # Rate limit для формы записи на уровне nginx
    limit_req_zone $binary_remote_addr zone=booking:10m rate=2r/m;
    location = /api/booking {
        limit_req zone=booking burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Всё остальное
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
