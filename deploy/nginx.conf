# /etc/nginx/sites-available/mateevmassage.com
# Этот файл включается в блок http{} основного nginx.conf,
# поэтому директивы верхнего уровня здесь — это уровень http.

# Rate limit для формы записи — должен быть на уровне http, не server
limit_req_zone $binary_remote_addr zone=booking:10m rate=2r/m;

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types text/html text/css application/javascript application/json image/svg+xml text/plain;

server {
    listen 80;
    server_name mateevspa.md www.mateevspa.md;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mateevspa.md www.mateevspa.md;

    ssl_certificate     /etc/letsencrypt/live/mateevspa.md/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mateevspa.md/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Логи
    access_log /var/log/nginx/mateev.access.log;
    error_log  /var/log/nginx/mateev.error.log;

    # Размер тела запроса — 12m чтобы покрыть фото в base64 (5MB файл = ~7MB base64)
    client_max_body_size 12m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                         always;
    add_header X-Frame-Options         "SAMEORIGIN"                      always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; frame-src https://maps.google.com https://www.google.com; connect-src 'self'" always;

    # Кэш статики (css, js, svg)
    location ~* \.(css|js|svg)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=3600";
    }

    # Health check — не логируем
    location = /api/health {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }

    # Rate limit для формы записи
    location = /api/booking {
        limit_req zone=booking burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Всё остальное
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
