<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Denis Matievici — Mateev Spa Studio</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #1a2e22;
      --sage:   #6b8d6b;
      --sand:   #f7f0e6;
      --warm:   #e8ddd0;
      --accent: #b36d2c;
      --muted:  #7d6d60;
      --ink:    #241c17;
    }

    html, body {
      min-height: 100svh;
      background: var(--forest);
      font-family: 'Manrope', sans-serif;
      color: var(--ink);
    }

    .page {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    /* ─── Header ─── */
    .card-header {
      width: 100%;
      background: var(--forest);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px 32px;
      text-align: center;
    }
    .card-logo {
      width: 72px;
      height: 72px;
      object-fit: contain;
      margin-bottom: 16px;
      filter: brightness(0) invert(1) opacity(0.9);
    }
    .card-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 4px;
    }
    .card-services {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.04em;
    }

    /* ─── Body card ─── */
    .card-body {
      width: calc(100% - 32px);
      max-width: 420px;
      background: var(--sand);
      border-radius: 24px;
      margin-top: -20px;
      overflow: hidden;
      box-shadow: 0 12px 48px rgba(0,0,0,0.25);
    }

    /* ─── Action buttons ─── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--warm);
    }
    .action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 20px 12px;
      background: var(--sand);
      text-decoration: none;
      color: var(--ink);
      transition: background 0.15s;
      cursor: pointer;
      border: none;
      font-family: 'Manrope', sans-serif;
    }
    .action-btn:hover, .action-btn:active { background: var(--warm); }
    .action-btn__icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }
    .action-btn__label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .action-btn--call   .action-btn__icon { background: rgba(26,46,34,0.1); }
    .action-btn--wa     .action-btn__icon { background: rgba(37,211,102,0.12); }
    .action-btn--ig     .action-btn__icon { background: rgba(225,48,108,0.1); }
    .action-btn--book   .action-btn__icon { background: rgba(179,109,44,0.12); }

    /* ─── Save contact ─── */
    .save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 18px 24px;
      background: var(--forest);
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .save-btn:hover { opacity: 0.88; }

    /* ─── Info rows ─── */
    .info-rows {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      border-top: 1px solid var(--warm);
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.88rem;
      color: var(--ink);
      text-decoration: none;
    }
    .info-row__icon {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(26,46,34,0.07);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .info-row span { font-weight: 500; }

    /* ─── Footer ─── */
    .card-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .card-footer a { color: rgba(255,255,255,0.35); text-decoration: none; }
  </style>
</head>
<body>
<div class="page">

  <div class="card-header">
    <img class="card-logo" src="/mateev_logo.png" alt="Mateev Spa Studio">
    <h1 class="card-name">Denis Matievici</h1>
    <p class="card-title">Massage Therapist &amp; Educator</p>
    <p class="card-services">Massage · Body Care · Aesthetics</p>
  </div>

  <div class="card-body">

    <div class="actions">
      <a class="action-btn action-btn--call" href="tel:+37369158475">
        <div class="action-btn__icon">📞</div>
        <span class="action-btn__label">Позвонить</span>
      </a>
      <a class="action-btn action-btn--wa" href="https://wa.me/37369158475" target="_blank" rel="noopener">
        <div class="action-btn__icon">💬</div>
        <span class="action-btn__label">WhatsApp</span>
      </a>
      <a class="action-btn action-btn--ig" href="https://instagram.com/_mateevspa_" target="_blank" rel="noopener">
        <div class="action-btn__icon">📸</div>
        <span class="action-btn__label">Instagram</span>
      </a>
      <a class="action-btn action-btn--book" href="/#booking">
        <div class="action-btn__icon">📅</div>
        <span class="action-btn__label">Записаться</span>
      </a>
    </div>

    <button class="save-btn" onclick="saveContact()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Сохранить контакт
    </button>

    <div class="info-rows">
      <a class="info-row" href="tel:+37369158475">
        <div class="info-row__icon">📞</div>
        <span>+373 69 158 475</span>
      </a>
      <a class="info-row" href="https://wa.me/37369158475" target="_blank" rel="noopener">
        <div class="info-row__icon">💬</div>
        <span>WhatsApp</span>
      </a>
      <a class="info-row" href="https://instagram.com/_mateevspa_" target="_blank" rel="noopener">
        <div class="info-row__icon">📸</div>
        <span>@_mateevspa_</span>
      </a>
      <a class="info-row" href="https://mateevmassage.com" target="_blank" rel="noopener">
        <div class="info-row__icon">🌐</div>
        <span>mateevmassage.com</span>
      </a>
    </div>

  </div>

  <div class="card-footer">
    <a href="/">mateevmassage.com</a> · Кишинёв, Молдова
  </div>

</div>

<script>
function saveContact() {
  const vcard = [
    "BEGIN:VCARD",
    "VERSION:3.0",
    "FN:Denis Matievici",
    "N:Matievici;Denis;;;",
    "ORG:Mateev Spa Studio",
    "TITLE:Massage Therapist & Educator",
    "TEL;TYPE=CELL:+37369158475",
    "URL:https://mateevmassage.com",
    "X-SOCIALPROFILE;TYPE=instagram:https://instagram.com/_mateevspa_",
    "NOTE:Massage · Body Care · Aesthetics",
    "END:VCARD"
  ].join("\r\n");

  const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = "Denis_Matievici.vcf";
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
