<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Личный кабинет — Mateev Spa Studio</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #1a2e22;
      --sage: #6b8d6b;
      --sand: #f7f0e6;
      --warm: #e8ddd0;
      --line: rgba(26,46,34,0.12);
      --muted: #7d6d60;
      --accent: #b36d2c;
      --success: #2d6a4f;
      --radius: 16px;
    }

    html { font-size: 16px; }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--sand);
      color: var(--forest);
      min-height: 100svh;
    }

    .page { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }

    /* Header */
    .portal-header {
      text-align: center;
      padding: 40px 0 32px;
    }
    .portal-header__logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--forest);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 24px;
    }
    .portal-header__eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sage);
      margin-bottom: 6px;
    }
    .portal-header__name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 600;
      line-height: 1.1;
      color: var(--forest);
      margin-bottom: 8px;
    }
    .portal-header__sub {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .stat-card span { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
    .stat-card strong { font-size: 1.4rem; font-weight: 700; color: var(--forest); }

    /* Card */
    .portal-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .portal-card__head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .portal-card__title {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--sage);
    }
    .portal-card__body { padding: 0; }

    /* Next booking */
    .next-booking {
      padding: 20px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .next-booking__date-box {
      flex-shrink: 0;
      width: 56px;
      height: 60px;
      background: var(--forest);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .next-booking__date-box .day { font-size: 1.5rem; font-weight: 700; line-height: 1; }
    .next-booking__date-box .month { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; opacity: 0.8; }
    .next-booking__info { flex: 1; min-width: 0; }
    .next-booking__service { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
    .next-booking__meta { font-size: 0.82rem; color: var(--muted); }
    .next-booking__empty { padding: 24px 20px; text-align: center; color: var(--muted); font-size: 0.88rem; }

    /* Visit row */
    .visit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
    }
    .visit-row:last-child { border-bottom: none; }
    .visit-row__date { flex-shrink: 0; width: 44px; text-align: center; }
    .visit-row__date .vday { font-size: 1.1rem; font-weight: 700; color: var(--forest); line-height: 1; }
    .visit-row__date .vmonth { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; }
    .visit-row__info { flex: 1; min-width: 0; }
    .visit-row__service { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .visit-row__sub { font-size: 0.78rem; color: var(--muted); }
    .visit-row__status { flex-shrink: 0; font-size: 0.75rem; font-weight: 600; padding: 3px 8px; border-radius: 6px; }
    .status--completed { background: rgba(45,106,79,0.1); color: var(--success); }
    .status--confirmed { background: rgba(179,109,44,0.1); color: var(--accent); }
    .status--cancelled { background: rgba(180,50,50,0.1); color: #b43232; }

    /* Package row */
    .pkg-row {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }
    .pkg-row:last-child { border-bottom: none; }
    .pkg-row__head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .pkg-row__name { font-size: 0.9rem; font-weight: 600; }
    .pkg-row__remaining { font-size: 0.9rem; font-weight: 700; color: var(--success); }
    .pkg-progress { height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
    .pkg-progress__fill { height: 100%; background: var(--sage); border-radius: 3px; transition: width 0.3s; }
    .pkg-row__sub { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

    /* CTA */
    .portal-cta {
      text-align: center;
      padding: 24px 16px;
    }
    .button-main {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--forest);
      color: #fff;
      font-family: 'Manrope', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .button-main:hover { opacity: 0.85; }

    /* States */
    .loading-state, .error-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }
    .error-state { color: #b43232; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--line);
      border-top-color: var(--sage);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .portal-footer {
      text-align: center;
      padding: 24px 0;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .portal-footer a { color: var(--sage); text-decoration: none; }
  </style>
</head>
<body>
<div class="page" id="app">
  <div class="loading-state">
    <div class="spinner"></div>
    <p>Загружаем ваш кабинет...</p>
  </div>
</div>

<script>
const MONTHS = {
  ru: { short: ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"],
        full: ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"] },
  ro: { short: ["ian","feb","mar","apr","mai","iun","iul","aug","sep","oct","noi","dec"],
        full: ["ianuarie","februarie","martie","aprilie","mai","iunie","iulie","august","septembrie","octombrie","noiembrie","decembrie"] }
};
const STATUS_LABELS = {
  ru: { completed: "Завершён", confirmed: "Запланирован", cancelled: "Отменён", new: "Новый" },
  ro: { completed: "Finalizat", confirmed: "Programat", cancelled: "Anulat", new: "Nou" }
};

let LANG = localStorage.getItem("portalLang") === "ro" ? "ro" : "ru";
let currentData = null;
let rsInfo = null; // данные переносимой записи
const t = (ru, ro) => LANG === "ro" ? ro : ru;
const getToken = () => new URLSearchParams(location.search).get("token") || "";

function setLang(lang) {
  LANG = lang === "ro" ? "ro" : "ru";
  localStorage.setItem("portalLang", LANG);
  document.documentElement.lang = LANG;
  if (currentData) renderPortal(currentData);
  else renderLogin();
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const m = MONTHS[LANG].short;
  return { day: d.getDate(), month: m[d.getMonth()], full: `${d.getDate()} ${m[d.getMonth()]}` };
}

function escHtml(s) {
  return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function headerBar() {
  const tab = (l) => `<button onclick="setLang('${l}')" style="padding:4px 10px;border:none;border-radius:20px;font-size:0.78rem;font-weight:700;cursor:pointer;font-family:inherit;${LANG===l?'background:var(--forest);color:#fff;':'background:transparent;color:var(--muted);'}">${l.toUpperCase()}</button>`;
  return `<header style="display:flex;align-items:center;justify-content:space-between;padding:18px 4px 8px;">
    <a href="/" style="font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:var(--forest);text-decoration:none;">Mateev Spa Studio</a>
    <div style="display:flex;align-items:center;gap:14px;">
      <div style="display:flex;gap:2px;">${tab("ru")}${tab("ro")}</div>
      <a href="/" style="font-size:0.82rem;font-weight:600;color:var(--sage);text-decoration:none;white-space:nowrap;">← ${t("На главную","Acasă")}</a>
    </div>
  </header>`;
}

function renderPortal(data) {
  currentData = data;
  const app = document.getElementById("app");

  const nextBooking = data.upcoming[0];
  let nextHtml;
  if (nextBooking) {
    const d = fmtDate(nextBooking.date);
    nextHtml = `<div class="next-booking">
      <div class="next-booking__date-box">
        <span class="day">${d.day}</span>
        <span class="month">${d.month}</span>
      </div>
      <div class="next-booking__info">
        <p class="next-booking__service">${escHtml(nextBooking.serviceName)}</p>
        <p class="next-booking__meta">${escHtml(nextBooking.slot)} · ${escHtml(nextBooking.specialistName)}</p>
        ${nextBooking.reference ? `<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
          <button onclick="startReschedule()" style="font-size:0.78rem;font-weight:600;color:var(--forest);background:#fff;border:1px solid var(--sage);border-radius:8px;padding:5px 14px;cursor:pointer;font-family:inherit;">${t("Перенести","Reprogramează")}</button>
          <a href="/cancel?ref=${encodeURIComponent(nextBooking.reference)}" style="font-size:0.78rem;font-weight:600;color:#b43232;text-decoration:none;border:1px solid rgba(180,50,50,0.3);border-radius:8px;padding:5px 14px;">${t("Отменить","Anulează")}</a>
        </div>` : ""}
      </div>
    </div>`;
  } else {
    nextHtml = `<div class="next-booking__empty">${t("Нет запланированных визитов.","Nu aveți vizite programate.")}<br>${t("Запишитесь ниже!","Programați-vă mai jos!")}</div>`;
  }

  const upcomingOther = data.upcoming.slice(1);
  const allVisits = [...upcomingOther, ...data.past];
  const visitsHtml = allVisits.length ? allVisits.map(b => {
    const d = fmtDate(b.date);
    const statusClass = { completed: "status--completed", confirmed: "status--confirmed", cancelled: "status--cancelled" }[b.status] || "";
    return `<div class="visit-row">
      <div class="visit-row__date">
        <p class="vday">${d.day}</p>
        <p class="vmonth">${d.month}</p>
      </div>
      <div class="visit-row__info">
        <p class="visit-row__service">${escHtml(b.serviceName)}</p>
        <p class="visit-row__sub">${escHtml(b.slot)} · ${escHtml(b.specialistName)}</p>
      </div>
      <span class="visit-row__status ${statusClass}">${STATUS_LABELS[LANG][b.status] || b.status}</span>
    </div>`;
  }).join("") : `<div class="next-booking__empty">${t("История визитов пока пуста.","Istoricul vizitelor este gol.")}</div>`;

  const pkgsHtml = data.packages.length ? data.packages.map(p => {
    const used = p.total - p.remaining;
    const pct = p.total > 0 ? Math.round(used / p.total * 100) : 0;
    const expText = p.expiresAt ? ` · ${t("до","până la")} ${fmtDate(p.expiresAt).full}` : "";
    return `<div class="pkg-row">
      <div class="pkg-row__head">
        <span class="pkg-row__name">${escHtml(p.title || p.serviceName)}</span>
        <span class="pkg-row__remaining">${p.remaining} ${t("из","din")} ${p.total}</span>
      </div>
      <div class="pkg-progress"><div class="pkg-progress__fill" style="width:${pct}%"></div></div>
      <p class="pkg-row__sub">${escHtml(p.code)}${expText}</p>
    </div>`;
  }).join("") : `<div class="next-booking__empty">${t("Активных абонементов нет.","Nu aveți abonamente active.")}</div>`;

  const memberSinceLabel = data.memberSince
    ? (() => { const d = new Date(data.memberSince + "T00:00:00"); return `${MONTHS[LANG].full[d.getMonth()]} ${d.getFullYear()}`; })()
    : null;
  const loyaltyRows = [
    data.favoriteService ? { l: t("Любимая процедура","Procedura preferată"), v: data.favoriteService } : null,
    data.favoriteSpecialist ? { l: t("Ваш мастер","Maseurul dvs."), v: data.favoriteSpecialist } : null,
    memberSinceLabel ? { l: t("С нами с","Cu noi din"), v: memberSinceLabel } : null
  ].filter(Boolean);
  const loyaltyHtml = loyaltyRows.length ? `<div class="portal-card">
      <div class="portal-card__head"><span class="portal-card__title">${t("Ваша статистика","Statistica dvs.")}</span></div>
      <div class="portal-card__body">
        ${loyaltyRows.map(r => `<div class="visit-row" style="justify-content:space-between;">
          <span style="font-size:0.85rem;color:var(--muted);">${escHtml(r.l)}</span>
          <strong style="font-size:0.9rem;color:var(--forest);">${escHtml(r.v)}</strong>
        </div>`).join("")}
      </div>
    </div>` : "";

  const referralHtml = data.referralCode ? `<div class="portal-card">
      <div class="portal-card__head"><span class="portal-card__title">${t("Приведи друга","Invită un prieten")}</span></div>
      <div class="portal-card__body" style="padding:20px;text-align:center;">
        <p style="font-size:0.88rem;color:var(--muted);margin-bottom:14px;line-height:1.5;">${t("Поделитесь ссылкой — вам и другу по −10% на визит","Distribuiți linkul — −10% pentru amândoi")}</p>
        <div style="display:flex;gap:8px;align-items:center;background:var(--sand);border:1px solid var(--line);border-radius:10px;padding:8px 8px 8px 14px;">
          <input id="refLink" readonly value="${escHtml(data.referralLink)}" style="flex:1;min-width:0;border:none;background:transparent;font-size:0.8rem;color:var(--forest);font-family:inherit;outline:none;">
          <button onclick="copyRef()" id="refBtn" style="flex-shrink:0;padding:8px 14px;background:var(--forest);color:#fff;border:none;border-radius:8px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:inherit;">${t("Копировать","Copiază")}</button>
        </div>
        <p style="font-size:0.75rem;color:var(--muted);margin-top:10px;">${t("Ваш код","Codul")}: <strong>${escHtml(data.referralCode)}</strong></p>
      </div>
    </div>` : "";

  app.innerHTML = `
    ${headerBar()}
    <div class="portal-header" style="padding-top:20px;">
      <p class="portal-header__eyebrow">${t("Личный кабинет","Cont personal")}</p>
      <h1 class="portal-header__name">${escHtml(data.clientName)}</h1>
      <p class="portal-header__sub">${t("Добро пожаловать в ваш персональный кабинет","Bine ați venit în contul dvs. personal")}</p>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <span>${t("Визитов","Vizite")}</span>
        <strong>${data.totalVisits}</strong>
      </div>
      <div class="stat-card">
        <span>${t("Запланировано","Programate")}</span>
        <strong>${data.upcoming.length}</strong>
      </div>
      <div class="stat-card">
        <span>${t("Абонементы","Abonamente")}</span>
        <strong>${data.packages.length}</strong>
      </div>
    </div>

    ${loyaltyHtml}

    <div class="portal-card">
      <div class="portal-card__head">
        <span class="portal-card__title">${t("Ближайший визит","Următoarea vizită")}</span>
      </div>
      <div class="portal-card__body">${nextHtml}</div>
    </div>

    ${data.packages.length ? `<div class="portal-card">
      <div class="portal-card__head">
        <span class="portal-card__title">${t("Мои абонементы","Abonamentele mele")}</span>
      </div>
      <div class="portal-card__body">${pkgsHtml}</div>
    </div>` : ""}

    <div class="portal-card">
      <div class="portal-card__head">
        <span class="portal-card__title">${t("История визитов","Istoric vizite")}</span>
      </div>
      <div class="portal-card__body">${visitsHtml}</div>
    </div>

    ${referralHtml}

    <div class="portal-cta">
      <a class="button-main" href="/#booking">${t("Записаться на процедуру","Programare la procedură")}</a>
    </div>

    <div class="portal-footer">
      <a href="/">mateevmassage.com</a> &nbsp;·&nbsp; ${t("Кишинёв, Молдова","Chișinău, Moldova")}
    </div>
  `;
}

function renderLogin(errorMsg) {
  currentData = null;
  const app = document.getElementById("app");
  app.innerHTML = `
    ${headerBar()}
    <div class="portal-header" style="padding-top:20px;">
      <p class="portal-header__eyebrow">${t("Личный кабинет","Cont personal")}</p>
      <h1 class="portal-header__name">${t("Вход","Autentificare")}</h1>
      <p class="portal-header__sub">${t("Введите номер телефона, который указывали при записи","Introduceți numărul de telefon indicat la programare")}</p>
    </div>
    <div class="portal-card" style="padding:24px 20px;">
      <form id="loginForm" style="display:flex;flex-direction:column;gap:14px;">
        <input type="tel" id="loginPhone" inputmode="tel" autocomplete="tel"
          placeholder="+373 60 000 000"
          style="width:100%;padding:14px 16px;font-size:1rem;font-family:'Manrope',sans-serif;border:1px solid var(--line);border-radius:12px;background:var(--sand);color:var(--forest);outline:none;">
        ${errorMsg ? `<p style="color:#b43232;font-size:0.85rem;text-align:center;">${escHtml(errorMsg)}</p>` : ""}
        <button type="submit" class="button-main" style="width:100%;justify-content:center;" id="loginBtn">${t("Войти","Intră")}</button>
      </form>
      <p style="text-align:center;font-size:0.8rem;color:var(--muted);margin-top:16px;">
        ${t("Ещё не были у нас?","Nu ați fost încă la noi?")} <a href="/#booking" style="color:var(--sage);font-weight:600;">${t("Записаться","Programare")}</a>
      </p>
    </div>
    <div class="portal-footer">
      <a href="/">mateevmassage.com</a> &nbsp;·&nbsp; ${t("Кишинёв, Молдова","Chișinău, Moldova")}
    </div>
  `;
  document.getElementById("loginForm").addEventListener("submit", handleLogin);
  document.getElementById("loginPhone").focus();
}

async function handleLogin(e) {
  e.preventDefault();
  const phone = document.getElementById("loginPhone").value.trim();
  if (!phone) return;
  const btn = document.getElementById("loginBtn");
  btn.disabled = true;
  btn.textContent = t("Проверяем…","Se verifică…");
  try {
    const res = await fetch("/api/client-login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      renderLogin(data.message || t("Не удалось войти.","Autentificare eșuată."));
      return;
    }
    // Перезагружаем с токеном → откроется кабинет
    location.search = "?token=" + encodeURIComponent(data.token);
  } catch (err) {
    renderLogin(t("Ошибка сети. Попробуйте ещё раз.","Eroare de rețea. Încercați din nou."));
  }
}

function startReschedule() {
  const b = currentData && currentData.upcoming[0];
  if (!b) return;
  rsInfo = { ref: b.reference, serviceId: b.serviceId, specialistId: b.specialistId, bookingId: b.id, duration: b.durationMins || 0, serviceName: b.serviceName };
  const today = new Date().toISOString().slice(0, 10);
  const app = document.getElementById("app");
  app.innerHTML = `
    ${headerBar()}
    <div class="portal-header" style="padding-top:20px;">
      <p class="portal-header__eyebrow">${t("Перенос записи","Reprogramare")}</p>
      <h1 class="portal-header__name" style="font-size:1.5rem;">${escHtml(rsInfo.serviceName)}</h1>
    </div>
    <div class="portal-card" style="padding:24px 20px;">
      <label style="display:block;font-size:0.85rem;color:var(--muted);margin-bottom:8px;">${t("Выберите дату","Alegeți data")}</label>
      <input type="date" id="rsDate" min="${today}" value="${today}"
        style="width:100%;padding:12px 14px;font-size:1rem;font-family:inherit;border:1px solid var(--line);border-radius:12px;background:var(--sand);color:var(--forest);margin-bottom:16px;">
      <div id="rsSlots" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
      <p id="rsMsg" style="font-size:0.85rem;color:var(--muted);text-align:center;margin-top:10px;"></p>
    </div>
    <div class="portal-cta">
      <a href="?token=${encodeURIComponent(getToken())}" style="color:var(--muted);font-size:0.85rem;text-decoration:none;">← ${t("Назад в кабинет","Înapoi în cont")}</a>
    </div>
  `;
  document.getElementById("rsDate").addEventListener("change", loadRescheduleSlots);
  loadRescheduleSlots();
}

async function loadRescheduleSlots() {
  const date = document.getElementById("rsDate").value;
  const slotsDiv = document.getElementById("rsSlots");
  const msg = document.getElementById("rsMsg");
  slotsDiv.innerHTML = "";
  msg.textContent = t("Загружаем слоты…","Se încarcă orele…");
  try {
    const url = `/api/availability?serviceId=${encodeURIComponent(rsInfo.serviceId)}&specialistId=${encodeURIComponent(rsInfo.specialistId)}&date=${encodeURIComponent(date)}&excludeBookingId=${encodeURIComponent(rsInfo.bookingId)}${rsInfo.duration ? `&customDuration=${rsInfo.duration}` : ""}`;
    const res = await fetch(url);
    const data = await res.json().catch(() => ({ slots: [] }));
    const slots = data.slots || [];
    if (!slots.length) { msg.textContent = t("На эту дату нет свободных окон.","Nu sunt ore libere la această dată."); return; }
    msg.textContent = "";
    slotsDiv.innerHTML = slots.map(s =>
      `<button onclick="confirmReschedule('${date}','${s.time}')" style="padding:10px 14px;border:1px solid var(--sage);border-radius:10px;background:#fff;color:var(--forest);font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;">${s.time}</button>`
    ).join("");
  } catch (e) {
    msg.textContent = t("Ошибка загрузки слотов.","Eroare la încărcarea orelor.");
  }
}

async function confirmReschedule(date, slot) {
  if (!confirm(t(`Перенести запись на ${date}, ${slot}?`, `Reprogramați pe ${date}, ${slot}?`))) return;
  const msg = document.getElementById("rsMsg");
  msg.textContent = t("Переносим…","Se reprogramează…");
  try {
    const res = await fetch("/api/client-reschedule", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: getToken(), ref: rsInfo.ref, date, slot })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) { msg.textContent = data.message || t("Не удалось перенести.","Reprogramare eșuată."); return; }
    location.search = "?token=" + encodeURIComponent(getToken()); // вернёт в кабинет с обновлёнными данными
  } catch (e) {
    msg.textContent = t("Ошибка сети.","Eroare de rețea.");
  }
}

function copyRef() {
  const input = document.getElementById("refLink");
  const btn = document.getElementById("refBtn");
  input.select();
  const done = () => { btn.textContent = t("Скопировано!","Copiat!"); setTimeout(() => { btn.textContent = t("Копировать","Copiază"); }, 1500); };
  if (navigator.clipboard) navigator.clipboard.writeText(input.value).then(done).catch(() => { document.execCommand("copy"); done(); });
  else { document.execCommand("copy"); done(); }
}

async function init() {
  document.documentElement.lang = LANG;
  const token = new URLSearchParams(location.search).get("token");
  if (!token) {
    renderLogin();
    return;
  }
  try {
    const res = await fetch(`/api/client-portal?token=${encodeURIComponent(token)}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || t("Ошибка загрузки.","Eroare de încărcare."));
    }
    const data = await res.json();
    renderPortal(data);
  } catch (e) {
    document.getElementById("app").innerHTML = `${headerBar()}<div class="error-state">${escHtml(e.message)}</div>`;
  }
}

init();
</script>
</body>
</html>
