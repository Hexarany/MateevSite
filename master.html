<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Кабинет мастера — Mateev Spa Studio</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#1a2e22">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --forest: #1a2e22; --sage: #6b8d6b; --sand: #f7f0e6; --warm: #e8ddd0;
      --line: rgba(26,46,34,0.12); --ink: #241c17; --muted: #7d6d60; --brand: #b36d2c;
    }
    body { font-family: 'Manrope', sans-serif; background: var(--sand); color: var(--ink); line-height: 1.5; }
    .wrap { max-width: 720px; margin: 0 auto; padding: 0 16px 60px; }
    header.top { display: flex; align-items: center; justify-content: space-between; padding: 18px 4px 8px; }
    header.top a { font-family: 'Cormorant Garamond', serif; font-size: 1.05rem; font-weight: 600; color: var(--forest); text-decoration: none; }
    .master-head { display: flex; align-items: center; gap: 16px; padding: 22px 0 8px; }
    .master-head__avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; background: var(--warm); display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--forest); font-size: 1.2rem; flex-shrink: 0; }
    .master-head__name { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 700; color: var(--forest); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .badge { padding: 3px 9px; border-radius: 999px; background: rgba(40,72,56,0.1); color: var(--forest); font-size: 0.65rem; font-weight: 700; font-family: 'Manrope', sans-serif; }
    .master-head__role { color: var(--muted); font-size: 0.9rem; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 18px 0; }
    .stat { background: #fffaf4; border: 1px solid var(--line); border-radius: 14px; padding: 14px; text-align: center; }
    .stat span { display: block; font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .stat strong { display: block; font-size: 1.6rem; color: var(--forest); font-weight: 700; margin-top: 4px; }
    .card { background: #fffaf4; border: 1px solid var(--line); border-radius: 18px; margin-bottom: 16px; overflow: hidden; }
    .card__head { padding: 16px 18px 8px; font-weight: 700; color: var(--forest); font-size: 1rem; }
    .booking { padding: 14px 18px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; gap: 12px; }
    .booking:first-of-type { border-top: none; }
    .booking__when { font-weight: 700; color: var(--forest); white-space: nowrap; }
    .booking__svc { font-size: 0.85rem; color: var(--muted); margin-top: 2px; }
    .booking__client { text-align: right; }
    .booking__client a { color: var(--brand); text-decoration: none; font-size: 0.85rem; }
    .st { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 700; margin-top: 4px; }
    .st--confirmed { background: rgba(42,107,62,0.12); color: #2a6b3e; }
    .st--new { background: rgba(179,109,44,0.12); color: var(--brand); }
    .st--completed { background: rgba(125,109,96,0.12); color: var(--muted); }
    .empty { padding: 18px; color: var(--muted); font-size: 0.9rem; text-align: center; }
    .note { font-size: 0.8rem; color: var(--muted); margin-top: 4px; font-style: italic; }
    .block-row { padding: 10px 18px; border-top: 1px solid var(--line); font-size: 0.88rem; color: var(--muted); }
    .error-state { padding: 40px 20px; text-align: center; color: var(--muted); }
    .footer { text-align: center; color: var(--muted); font-size: 0.8rem; padding: 20px 0; }
    .cl-body { padding: 14px 18px; }
    .cl-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: end; }
    .cl-row label { flex: 1; min-width: 120px; }
    input[type=date], input[type=text], select, #clReason { padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; font-family: inherit; font-size: 0.9rem; background: var(--sand); color: var(--ink); width: 100%; margin-top: 4px; }
    .primary-btn { padding: 11px 18px; border: none; border-radius: 10px; background: var(--forest); color: #fff; font-weight: 700; font-family: inherit; cursor: pointer; }
    .mini-btn { padding: 5px 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; color: var(--forest); font-weight: 600; font-size: 0.8rem; cursor: pointer; font-family: inherit; flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="wrap" id="app">
    <div class="error-state">Загрузка…</div>
  </div>

  <script>
    const MONTHS = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
    const WEEKDAYS = ["Вс","Пн","Вт","Ср","Чт","Пт","Сб"];
    const STATUS = { completed: "Завершён", confirmed: "Подтверждён", new: "Новый", cancelled: "Отменён" };
    let MASTER = null;
    let ALL_BOOKINGS = [];
    let weekOffset = 0;

    function mondayOf(offset) {
      const d = new Date();
      const day = (d.getDay() + 6) % 7;
      d.setDate(d.getDate() - day + offset * 7);
      d.setHours(0, 0, 0, 0);
      return d;
    }
    function isoOf(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`; }
    function changeWeek(delta) { weekOffset += delta; renderWeek(); }
    function renderWeek() {
      const grid = document.getElementById("weekGrid");
      if (!grid) return;
      const mon = mondayOf(weekOffset);
      const days = [];
      for (let i = 0; i < 7; i++) { const d = new Date(mon); d.setDate(mon.getDate() + i); days.push(d); }
      const label = document.getElementById("weekLabel");
      if (label) label.textContent = `${days[0].getDate()} ${MONTHS[days[0].getMonth()]} – ${days[6].getDate()} ${MONTHS[days[6].getMonth()]}`;
      const todayIso = new Date().toISOString().slice(0, 10);
      grid.innerHTML = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;">
        ${days.map(d => {
          const di = isoOf(d);
          const dayB = ALL_BOOKINGS.filter(b => b.date === di && b.status !== "cancelled").sort((a, b) => a.slot < b.slot ? -1 : 1);
          const isToday = di === todayIso;
          return `<div style="background:${isToday ? 'rgba(40,72,56,0.07)' : '#fff'};border:1px solid var(--line);border-radius:10px;padding:5px;min-height:72px;">
            <div style="font-size:0.68rem;color:var(--muted);text-align:center;margin-bottom:4px;${isToday ? 'font-weight:700;color:var(--forest);' : ''}">${WEEKDAYS[d.getDay()]} ${d.getDate()}</div>
            ${dayB.map(b => `<div title="${esc(b.slot)} ${esc(b.clientName)} · ${esc(b.serviceName)}" style="font-size:0.6rem;background:${b.status === 'completed' ? 'rgba(125,109,96,0.15)' : 'rgba(179,109,44,0.16)'};border-radius:4px;padding:2px 3px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(b.slot)} ${esc(b.clientName)}</div>`).join("")}
          </div>`;
        }).join("")}
      </div>`;
    }

    function esc(s) { return String(s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
    function fmtDate(d) { const x = new Date(d + "T00:00:00"); return `${x.getDate()} ${MONTHS[x.getMonth()]}, ${WEEKDAYS[x.getDay()]}`; }
    function getToken() { return new URLSearchParams(location.search).get("token") || ""; }

    function bookingRow(b, actions) {
      const canAct = actions && b.status !== "completed" && b.status !== "cancelled";
      return `<div class="booking">
        <div>
          <div class="booking__when">${esc(fmtDate(b.date))} · ${esc(b.slot)}–${esc(b.endsAt)}</div>
          <div class="booking__svc">${esc(b.serviceName)}</div>
          ${b.notes ? `<div class="note">«${esc(b.notes)}»</div>` : ""}
          ${canAct ? `<div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
            <button class="mini-btn" style="border-color:#2a6b3e;color:#2a6b3e;" onclick="markBooking('${esc(b.id)}','completed')">✓ Завершить</button>
            <button class="mini-btn" onclick="startReschedule('${esc(b.id)}','${esc(b.serviceId || '')}')">🔁 Перенести</button>
            <button class="mini-btn" style="border-color:#b43232;color:#b43232;" onclick="markBooking('${esc(b.id)}','cancelled')">✗ Отменить</button>
          </div>` : ""}
        </div>
        <div class="booking__client">
          <div style="font-weight:600;">${esc(b.clientName)}</div>
          ${b.phone ? `<a href="tel:${esc(b.phone)}">${esc(b.phone)}</a>` : ""}
          ${b.phone && canAct ? `<div style="margin-top:4px;"><a href="https://wa.me/${esc(b.phone.replace(/\D/g, ''))}?text=${encodeURIComponent('Здравствуйте! Напоминаю о записи ' + fmtDate(b.date) + ' в ' + b.slot + '. Mateev Spa Studio 🌿')}" target="_blank" rel="noopener" style="color:#25d366;font-size:0.8rem;font-weight:600;text-decoration:none;">💬 Напомнить</a></div>` : ""}
          <div><span class="st st--${esc(b.status)}">${esc(STATUS[b.status] || b.status)}</span></div>
        </div>
      </div>`;
    }

    async function sharePage() {
      const url = location.origin + "/team/" + MASTER.id;
      try { await navigator.clipboard.writeText(url); alert("Ссылка на вашу страницу скопирована:\n" + url); }
      catch { window.prompt("Ваша публичная страница (скопируйте):", url); }
    }

    function exportMyBookings() {
      const st = { completed: "Завершён", confirmed: "Подтверждён", new: "Новый", cancelled: "Отменён" };
      const rows = [["Дата", "Время", "Услуга", "Клиент", "Телефон", "Статус"]];
      ALL_BOOKINGS.forEach(b => rows.push([b.date, b.slot + "–" + b.endsAt, b.serviceName, b.clientName, b.phone || "", st[b.status] || b.status]));
      const e2 = (v) => `"${String(v).replace(/"/g, '""')}"`;
      const csv = "﻿" + rows.map(r => r.map(e2).join(";")).join("\r\n");
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8;" }));
      a.download = "my-bookings-" + new Date().toISOString().slice(0, 10) + ".csv";
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function startReschedule(id, serviceId) {
      const today = new Date().toISOString().slice(0, 10);
      const ov = document.createElement("div");
      ov.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;";
      ov.innerHTML = `<div style="background:#fffaf4;border-radius:18px;padding:22px;max-width:360px;width:100%;">
        <h3 style="margin-bottom:14px;color:var(--forest);font-family:'Cormorant Garamond',serif;font-size:1.4rem;">Перенести запись</h3>
        <label style="font-size:0.8rem;color:var(--muted);">Новая дата<input type="date" id="rsDate" min="${today}" value="${today}"></label>
        <label style="font-size:0.8rem;color:var(--muted);display:block;margin-top:8px;">Новое время<select id="rsSlot"><option value="">—</option></select></label>
        <div style="display:flex;gap:8px;margin-top:16px;">
          <button class="primary-btn" id="rsConfirm" style="flex:1;">Перенести</button>
          <button class="mini-btn" id="rsCancel">Отмена</button>
        </div>
      </div>`;
      document.body.appendChild(ov);
      const dateEl = ov.querySelector("#rsDate"), slotEl = ov.querySelector("#rsSlot");
      async function loadSlots() {
        slotEl.innerHTML = '<option value="">Загрузка…</option>';
        try {
          const res = await fetch(`/api/availability?serviceId=${encodeURIComponent(serviceId)}&specialistId=${encodeURIComponent(MASTER.id)}&date=${encodeURIComponent(dateEl.value)}&excludeBookingId=${encodeURIComponent(id)}&admin=true`);
          const data = await res.json();
          const slots = (data.slots || []).map(x => x.time);
          slotEl.innerHTML = slots.length ? slots.map(t => `<option value="${t}">${t}</option>`).join("") : '<option value="">Нет свободных слотов</option>';
        } catch { slotEl.innerHTML = '<option value="">Ошибка</option>'; }
      }
      dateEl.addEventListener("change", loadSlots);
      loadSlots();
      ov.querySelector("#rsCancel").addEventListener("click", () => ov.remove());
      ov.addEventListener("click", (e) => { if (e.target === ov) ov.remove(); });
      ov.querySelector("#rsConfirm").addEventListener("click", async () => {
        const date = dateEl.value, slot = slotEl.value;
        if (!date || !slot) { alert("Выберите дату и время."); return; }
        try {
          const res = await fetch("/api/master/reschedule", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token: getToken(), bookingId: id, date, slot })
          });
          if (!res.ok) { const e = await res.json().catch(() => ({})); alert(e.message || "Не удалось перенести."); return; }
          ov.remove(); init();
        } catch { alert("Ошибка сети."); }
      });
    }

    async function markBooking(id, status) {
      if (status === "cancelled" && !confirm("Отметить как неявку? Слот освободится.")) return;
      try {
        const res = await fetch("/api/master/booking-status", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: getToken(), bookingId: id, status })
        });
        if (!res.ok) { const e = await res.json().catch(() => ({})); alert(e.message || "Не удалось."); return; }
        init();
      } catch { alert("Ошибка сети."); }
    }

    function render(data) {
      const s = data.specialist;
      MASTER = s;
      ALL_BOOKINGS = data.all || [];
      const avatar = s.photo
        ? `<img class="master-head__avatar" src="${esc(s.photo)}" alt="${esc(s.name)}">`
        : `<div class="master-head__avatar">${esc(s.initials || "?")}</div>`;
      const upcoming = data.upcoming.length
        ? data.upcoming.map(b => bookingRow(b, true)).join("")
        : `<div class="empty">Ближайших записей нет.</div>`;
      const past = data.past.length
        ? data.past.map(bookingRow).join("")
        : `<div class="empty">Пока нет завершённых визитов.</div>`;
      const todayIso = new Date().toISOString().slice(0, 10);
      const blockRows = data.blocks.length
        ? data.blocks.map(b => `<div class="block-row" style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
            <span>🚫 ${esc(fmtDate(b.date))}${b.start === "00:00" && b.end >= "23:00" ? " — весь день" : ` · ${esc(b.start)}–${esc(b.end)}`}${b.reason ? " · " + esc(b.reason) : ""}</span>
            <button class="mini-btn" onclick="openDay('${esc(b.date)}')">Открыть</button>
          </div>`).join("")
        : `<div class="empty">Закрытых дней нет.</div>`;

      document.getElementById("app").innerHTML = `
        <header class="top">
          <a href="/">Mateev Spa Studio</a>
          <span style="font-size:0.82rem;color:var(--muted);">Кабинет мастера</span>
        </header>
        <div class="master-head">
          ${avatar}
          <div>
            <div class="master-head__name">${esc(s.name)}${s.certified ? `<span class="badge">✓ Mateev-certified</span>` : ""}</div>
            <div class="master-head__role">${esc(s.role)}${s.location ? " · 📍 " + esc(s.location) : ""}</div>
          </div>
        </div>

        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
          <button class="mini-btn" onclick="sharePage()">🔗 Моя страница</button>
          <button class="mini-btn" onclick="exportMyBookings()">⬇ CSV записей</button>
        </div>

        <div class="stats">
          <div class="stat"><span>Сегодня</span><strong>${data.stats.todayCount}</strong></div>
          <div class="stat"><span>Впереди</span><strong>${data.stats.upcomingCount}</strong></div>
          <div class="stat"><span>Завершено</span><strong>${data.stats.completedTotal}</strong></div>
        </div>

        <div class="card">
          <div class="card__head" style="display:flex;justify-content:space-between;align-items:center;">
            <span>Календарь недели</span>
            <span style="display:flex;gap:6px;align-items:center;">
              <button class="mini-btn" onclick="changeWeek(-1)">←</button>
              <span id="weekLabel" style="font-size:0.78rem;color:var(--muted);min-width:110px;text-align:center;"></span>
              <button class="mini-btn" onclick="changeWeek(1)">→</button>
            </span>
          </div>
          <div id="weekGrid" style="padding:8px;overflow-x:auto;"></div>
        </div>

        ${data.telegramLinked
          ? `<div class="card"><div class="cl-body" style="display:flex;align-items:center;gap:12px;">
              <span style="font-size:1.5rem;">🔔</span>
              <div><strong style="color:var(--forest);">Уведомления в Telegram подключены</strong>
              <div style="font-size:0.82rem;color:var(--muted);">Новые записи приходят в чат. Отключить — /stop в боте.</div></div>
            </div></div>`
          : (data.telegramConnectUrl ? `<div class="card"><div class="cl-body" style="text-align:center;">
              <p style="font-size:0.9rem;color:var(--muted);margin-bottom:12px;">Получайте новые записи прямо в Telegram</p>
              <a href="${esc(data.telegramConnectUrl)}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:8px;padding:11px 20px;background:#229ED9;color:#fff;border-radius:10px;font-weight:600;text-decoration:none;">✈️ Уведомления в Telegram</a>
            </div></div>` : "")}

        <div class="card">
          <div class="card__head">Заработок за месяц</div>
          <div class="cl-body" style="display:flex;justify-content:space-between;align-items:center;">
            <div>
              <strong style="font-size:1.5rem;color:var(--forest);">${(data.stats.monthRevenue || 0).toLocaleString("ru-RU")} MDL</strong>
              <div style="font-size:0.82rem;color:var(--muted);">${data.stats.monthSessions || 0} завершённых сеансов</div>
            </div>
            ${s.commissionPercent ? `<div style="text-align:right;font-size:0.8rem;color:var(--muted);">Комиссия сети ${s.commissionPercent}%<br>к оплате: <strong style="color:var(--brand);">${Math.round((data.stats.monthRevenue || 0) * s.commissionPercent / 100).toLocaleString("ru-RU")} MDL</strong></div>` : ""}
          </div>
        </div>

        <div class="card">
          <div class="card__head">Добавить запись</div>
          <div class="cl-body">
            ${(s.services && s.services.length) ? `
              <label>Процедура<select id="mbService" onchange="loadMasterSlots()">
                ${s.services.map(sv => `<option value="${esc(sv.id)}">${esc(sv.name)} · ${sv.duration} мин · ${sv.price} MDL</option>`).join("")}
              </select></label>
              <div class="cl-row" style="margin-top:8px;">
                <label>Дата<input type="date" id="mbDate" min="${todayIso}" value="${todayIso}" onchange="loadMasterSlots()"></label>
                <label>Время<select id="mbSlot"><option value="">—</option></select></label>
              </div>
              <input type="text" id="mbName" placeholder="Имя клиента" style="margin-top:8px;">
              <input type="text" id="mbPhone" placeholder="Телефон (необязательно)" style="margin-top:8px;">
              <button class="primary-btn" onclick="createMasterBooking()" style="margin-top:10px;">Создать запись</button>
            ` : `<div class="empty">Чтобы заносить записи, попросите добавить вам услуги в админке.</div>`}
          </div>
        </div>

        <div class="card">
          <div class="card__head">Ближайшие записи</div>
          ${upcoming}
        </div>

        <div class="card">
          <div class="card__head">Управление днями</div>
          <div class="cl-body">
            <div class="cl-row">
              <label>С даты<input type="date" id="clFrom" min="${todayIso}" value="${todayIso}"></label>
              <label>По дату<input type="date" id="clTo" min="${todayIso}" value="${todayIso}"></label>
            </div>
            <input type="text" id="clReason" placeholder="Причина (необязательно): отпуск, обучение…" style="margin-top:8px;">
            <button class="primary-btn" onclick="closeDays()" style="margin-top:10px;">Закрыть день / период</button>
          </div>
          ${blockRows}
        </div>

        <div class="card">
          <div class="card__head">История визитов</div>
          ${past}
        </div>

        <div class="footer">mateevmassage.com · Кабинет мастера</div>
      `;

      if (s.services && s.services.length) loadMasterSlots();
      renderWeek();
    }

    async function loadMasterSlots() {
      const svc = document.getElementById("mbService")?.value;
      const date = document.getElementById("mbDate")?.value;
      const sel = document.getElementById("mbSlot");
      if (!sel) return;
      if (!svc || !date || !MASTER) { sel.innerHTML = '<option value="">—</option>'; return; }
      sel.innerHTML = '<option value="">Загрузка…</option>';
      try {
        const res = await fetch(`/api/availability?serviceId=${encodeURIComponent(svc)}&specialistId=${encodeURIComponent(MASTER.id)}&date=${encodeURIComponent(date)}&admin=true`);
        const data = await res.json();
        const slots = (data.slots || []).map(x => x.time);
        sel.innerHTML = slots.length ? slots.map(t => `<option value="${t}">${t}</option>`).join("") : '<option value="">Нет свободных слотов</option>';
      } catch { sel.innerHTML = '<option value="">Ошибка</option>'; }
    }

    async function createMasterBooking() {
      const serviceId = document.getElementById("mbService").value;
      const date = document.getElementById("mbDate").value;
      const slot = document.getElementById("mbSlot").value;
      const clientName = document.getElementById("mbName").value.trim();
      const phone = document.getElementById("mbPhone").value.trim();
      if (!serviceId || !date || !slot) { alert("Выберите процедуру, дату и время."); return; }
      if (clientName.length < 2) { alert("Укажите имя клиента."); return; }
      try {
        const res = await fetch("/api/master/booking", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: getToken(), serviceId, date, slot, clientName, phone })
        });
        if (!res.ok) { const e = await res.json().catch(() => ({})); alert(e.message || "Не удалось создать запись."); return; }
        init();
      } catch { alert("Ошибка сети."); }
    }

    async function closeDays() {
      const from = document.getElementById("clFrom").value;
      const to = document.getElementById("clTo").value;
      const reason = document.getElementById("clReason").value.trim();
      if (!from || !to || from > to) { alert("Укажите корректный период."); return; }
      try {
        const res = await fetch("/api/master/block", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token: getToken(), from, to, reason })
        });
        if (!res.ok) { const e = await res.json().catch(() => ({})); alert(e.message || "Не удалось закрыть."); return; }
        init();
      } catch { alert("Ошибка сети."); }
    }

    async function openDay(date) {
      try {
        const res = await fetch(`/api/master/block?token=${encodeURIComponent(getToken())}&date=${encodeURIComponent(date)}`, { method: "DELETE" });
        if (!res.ok) { const e = await res.json().catch(() => ({})); alert(e.message || "Не удалось открыть."); return; }
        init();
      } catch { alert("Ошибка сети."); }
    }

    async function init() {
      const token = getToken();
      if (!token) {
        document.getElementById("app").innerHTML = `<div class="error-state">Нет доступа. Откройте свою персональную ссылку кабинета.</div>`;
        return;
      }
      try {
        const res = await fetch(`/api/master/dashboard?token=${encodeURIComponent(token)}`);
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.message || "Ошибка загрузки.");
        }
        render(await res.json());
      } catch (e) {
        document.getElementById("app").innerHTML = `<div class="error-state">${esc(e.message)}</div>`;
      }
    }

    init();
  </script>
</body>
</html>
